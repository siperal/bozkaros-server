# Delta overrides — OSCAP already handled base Level 1+2
# These are Siperal Bozkaros specific controls not in scap-security-guide

# Purpose and hardening of Bozkaros
bozkarcis_level: 2
bozkarcis_install_type: server

# Partitions already done by Kickstart — skip role partition tasks
bozkarcis_tmp_svc: false
bozkarcis_vartmp_tmp_svc: false

# FIPS already enabled above
bozkarcis_fips_enabled: true
bozkarcis_crypto_policy: "FIPS"

# Bootloader password already set in Kickstart
bozkarcis_set_boot_pass: false
# TODO what this rule refers to / what it switches

# Disable all unneeded servers
bozkarcis_avahi_server: false
bozkarcis_cups_server: false
bozkarcis_dhcp_server: false
bozkarcis_ldap_server: false
bozkarcis_nfs_server: false
bozkarcis_dns_server: false
bozkarcis_ftp_server: false
bozkarcis_http_server: false
bozkarcis_samba_server: false
bozkarcis_squid_proxy_server: false
bozkarcis_snmp_server: false
bozkarcis_rsync_server: false

# Level 2 specific
bozkarcis_ipv6_required: false
bozkarcis_wireless_disable: true
bozkarcis_firewall_default_zone: "drop"

bozkarcis_sudo_timestamp_timeout: 0
bozkarcis_sudo_log: true
bozkarcis_sudo_logfile: "/var/log/sudo.log"

bozkarcis_sshd:
  PermitRootLogin: "no"
  X11Forwarding: "no"
  AllowTcpForwarding: "no"
  LogLevel: VERBOSE
  ClientAliveInterval: 300
  ClientAliveCountMax: 3
  Banner: "/etc/issue.net"
  Ciphers: "aes256-ctr,aes192-ctr,aes128-ctr"
  MACs: "hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com"

bozkarcis_auditd_disk_full_action: halt
bozkarcis_auditd_disk_error_action: halt
bozkarcis_auditd_admin_space_left_action: halt
